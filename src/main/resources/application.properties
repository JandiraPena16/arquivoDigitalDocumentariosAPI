# ============================================================
# ARQUIVO DIGITAL DE DOCUMENTÁRIOS — Configuração Principal
# ============================================================

# Servidor
server.port=8080
server.servlet.context-path=/

# URL base do servidor (usado nos links retornados pela API)
# Altere para o IP da máquina quando testar em dispositivos físicos
arquivo.server.base-url=http://192.168.100.171:8080

# ============================================================
# BASE DE DADOS — PostgreSQL
# ============================================================
spring.datasource.url=jdbc:postgresql://localhost:5432/arquivo_digital
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# ============================================================
# UPLOAD DE FICHEIROS
# ============================================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=2GB
spring.servlet.multipart.max-request-size=2GB

# ============================================================
# CONFIGURAÇÕES PERSONALIZADAS DA APLICAÇÃO
# ============================================================

# Diretório de armazenamento de ficheiros
arquivo.storage.path=./uploads
arquivo.storage.originais=./uploads/originais
arquivo.storage.comprimidos=./uploads/comprimidos
arquivo.storage.thumbnails=./uploads/thumbnails
arquivo.storage.temp=./uploads/temp
arquivo.storage.legendas=./uploads/legendas

# JWT
arquivo.jwt.secret=3cfa76ef14937c1c0ea519f8fc057a80fcd04a7420f8e8bcd0a7567c272e007b
arquivo.jwt.expiracao-ms=86400000

# FFmpeg (caminho do executável — ajuste se necessário)
arquivo.ffmpeg.path=ffmpeg
arquivo.ffmpeg.ffprobe-path=ffprobe

# Whisper (legendas automáticas — instalar com: pip install openai-whisper)
# No Windows com Python, usar: "python -m whisper"  |  No Linux/Mac com Whisper instalado: "whisper"
# Modelos disponíveis: tiny, base, small, medium, large (quanto maior, mais preciso mas mais lento)
arquivo.whisper.path=python -m whisper
arquivo.whisper.model=base
arquivo.whisper.language=pt

# Compressão de vídeo padrão
arquivo.compressao.video-codec=libx264
arquivo.compressao.audio-codec=aac
arquivo.compressao.crf=23
arquivo.compressao.preset=medium

# Sessão
arquivo.sessao.max-por-utilizador=5

# ============================================================
# SWAGGER / OPENAPI
# ============================================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.try-it-out-enabled=true
springdoc.swagger-ui.filter=true
springdoc.default-produces-media-type=application/json

# ============================================================
# LOGGING
# ============================================================
logging.level.com.arquivodigital=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
logging.pattern.console=%d{HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
